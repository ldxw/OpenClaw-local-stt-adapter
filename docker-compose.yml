services:
  local-stt-adapter:
    build: .
    container_name: local-stt-adapter
    restart: unless-stopped
    ports:
      - "127.0.0.1:${STT_PORT}:8080"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL}
      WHISPER_DEVICE: ${WHISPER_DEVICE}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE}
      API_TOKEN: ${API_TOKEN}
    volumes:
      - ./models:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request; req=urllib.request.Request('http://127.0.0.1:8080/healthz', headers={'Authorization':'Bearer ' + os.environ['API_TOKEN']}); urllib.request.urlopen(req, timeout=10).read()\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
